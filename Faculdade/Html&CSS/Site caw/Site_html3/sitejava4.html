<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Somar 10 primeiros numeros naturais</title>
    </head>

    <body>
        <script>
            function soma10PrimeirosNum () {

                let soma = 0;

                for (let i = 0; i <= 10; i++) {

                    soma += i;
                }

                console.log("Soma dos 10 primeiros numeros naturais é", soma);

            }

            soma10PrimeirosNum();

        </script>
    </body> 
</html>
