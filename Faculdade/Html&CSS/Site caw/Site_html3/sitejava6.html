<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Imprimir numeros de 1 a 50 ímpares</title>
    </head>
    <body>
        <script>
            function determinarParImpar () {

                for (let i = 1; i <= 50; i++) {

                    if (i % 2 != 0) {

                        console.log(i + " é impar.");
                    }
                }
            }

            determinarParImpar();

        </script>
    </body> 
</html>
