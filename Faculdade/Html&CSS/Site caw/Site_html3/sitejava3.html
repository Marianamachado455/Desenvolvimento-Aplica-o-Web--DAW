<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Printar de 1 até 10</title>
    </head>

    <body>
        <script>
            function encontrarDivisivel35 () {

                let i = 1;

                while (i <= 100) {

                    if (i % 7 == 0 && i % 5 == 0) {

                        console.log(i + " é um divisivel por 7 e 5.");
                    }
                    i++;
                }

            }

            encontrarDivisivel35();

        </script>
    </body> 
</html>
