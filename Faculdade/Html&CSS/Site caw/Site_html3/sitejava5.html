<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Determine se um número é par ou ímpar</title>
    </head>

    <center> <h1> Digite um número </h1> </center>

    <center> <button onclick="determinarParImpar()">Enviar</button> </center>
    

    <body>
        <script>
            function determinarParImpar () {

                let input = prompt("Digite um número:");  // recebe input como string
                let n = Number(input);

                if (n % 2 == 0) {

                    alert("O numero é par");
                }

                else {
                    alert("O numero é impar");
                }
            }
            
        </script>
    </body> 
</html>
