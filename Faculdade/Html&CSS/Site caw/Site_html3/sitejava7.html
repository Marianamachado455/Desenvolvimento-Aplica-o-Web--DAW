<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Imprimir dias da semana baseado em seu algarismo correspondente</title>
    </head>

    <center> <h1> Digite um número </h1> </center>

    <center> <button onclick="DeterminarDiaSemana()">Enviar</button> </center>
    

    <body>
        <script>
            function DeterminarDiaSemana () {

                let input = prompt("Digite um número:");  // recebe input como string
                let n = Number(input);

                switch (true) {
                    case n == 1:
                        alert("Domingo");
                        break;

                    case n == 2:
                        alert("Segunda.");
                        break;

                    case n == 3:
                        alert("Terça");
                        break;
                    
                    case n == 4:
                        alert("Quarta");
                        break;

                    case n == 5:
                        alert("Quinta");
                        break;

                    case n == 6:
                        alert("Sexta");
                        break;

                    case n == 7:
                        alert("Sábado");
                        break;
                }
            }
            
        </script>
    </body> 
</html>
