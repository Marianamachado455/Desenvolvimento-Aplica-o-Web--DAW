<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Entrada de número</title>
    </head>
    <center> <h1> Digite um número </h1> </center>

    <center> <button onclick="verificarNumero()">Enviar</button> </center>
    
    <body>
        <script>
    function verificarNumero() {
        let input = prompt("Digite um número:");  // recebe input como string
        let n = Number(input); 
        
        switch (true) {
            case n > 0:
                alert("O numero é positivo");
                break;

            case n == 0:
                alert("O numero é zero.");
                break;

            case n < 0:
                alert("O numero é negativo");
                break;
        }
    }
        </script>
    </body> 
</html>
